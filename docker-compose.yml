services:
  postgres:
    image: postgres:12.2-alpine
    container_name: nakama-postgres
    environment:
      - POSTGRES_DB=nakama
      - POSTGRES_PASSWORD=localdb
    ports:
      - "5432:5432"
    volumes:
      - data:/var/lib/postgresql/data
    command: postgres -c shared_preload_libraries=pg_stat_statements -c pg_stat_statements.track=all

  # Build the image first (in this directory): docker build -t tictactoe-nakama:local .
  # Then docker compose up. (No `build:` here — avoids Compose requiring Buildx 0.17+ on older Docker.)
  # (Avoids Compose requiring Buildx 0.17+ on older Docker hosts.)
  nakama:
    image: tictactoe-nakama:local
    container_name: nakama-server
    depends_on:
      - postgres
    entrypoint:
     - "/bin/sh"
     - "-ecx"
     - |
       until /nakama/nakama migrate up --database.address postgres:localdb@postgres:5432/nakama; do
         sleep 2
       done

       exec /nakama/nakama \
        --config /nakama/data/local.yml \
        --name nakama1 \
        --database.address postgres:localdb@postgres:5432/nakama \
        --session.token_expiry_sec 7200 \
        --socket.server_key "ttt-game-key" \
        --socket.response_headers "Access-Control-Allow-Origin=*"
    ports:
      - "7350:7350"
      - "7351:7351"
    restart: unless-stopped

volumes:
  data: